name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Blocker.sln

      - name: Publish (framework-dependent)
        run: >
          dotnet publish src/Blocker.App/Blocker.App.csproj
          --configuration Release
          --output publish/framework-dependent

      - name: Publish Guardian (self-contained)
        run: >
          dotnet publish src/Blocker.Guardian/Blocker.Guardian.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output publish/self-contained

      - name: Publish App (self-contained)
        run: >
          dotnet publish src/Blocker.App/Blocker.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish/self-contained

      - name: Package framework-dependent
        run: Compress-Archive -Path publish/framework-dependent/* -DestinationPath Blocker-${{ github.ref_name }}-framework-dependent.zip

      - name: Package self-contained
        run: Compress-Archive -Path publish/self-contained/* -DestinationPath Blocker-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Blocker-${{ github.ref_name }}-framework-dependent.zip
            Blocker-${{ github.ref_name }}-win-x64.zip
