name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open Blocker
        2. Click "Enable blocking"
        3. ...
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows Version
      description: e.g. Windows 11 23H2, Windows 10 22H2
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET Runtime Version
      description: Run `dotnet --info` and paste the runtime version
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: Paste relevant logs from `%ProgramData%\Blocker\logs\app.log`
      render: text
    validations:
      required: false
